<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Main building -->
  <rect x="4" y="20" width="56" height="40" rx="2" fill="#b0b0b0" stroke="#707070" stroke-width="1.5"/>
  <!-- Roof -->
  <polygon points="4,20 32,4 60,20" fill="#909090" stroke="#707070" stroke-width="1.5"/>
  <!-- Processing tower -->
  <rect x="40" y="8" width="14" height="32" rx="1" fill="#a0a0a0" stroke="#707070" stroke-width="1"/>
  <rect x="42" y="6" width="10" height="4" rx="1" fill="#808080" stroke="#606060" stroke-width="0.8"/>
  <!-- Chimney -->
  <rect x="45" y="2" width="4" height="6" fill="#707070" stroke="#505050" stroke-width="0.8"/>
  <!-- Door / dock entrance -->
  <rect x="10" y="38" width="18" height="22" rx="1" fill="#505050" stroke="#404040" stroke-width="1"/>
  <!-- Conveyor belt -->
  <rect x="12" y="56" width="14" height="4" rx="1" fill="#606060" stroke="#404040" stroke-width="0.8"/>
  <g stroke="#707070" stroke-width="0.6">
    <line x1="14" y1="56" x2="14" y2="60"/>
    <line x1="18" y1="56" x2="18" y2="60"/>
    <line x1="22" y1="56" x2="22" y2="60"/>
  </g>
  <!-- Windows -->
  <rect x="34" y="34" width="4" height="4" rx="0.5" fill="#80b8d0" stroke="#607890" stroke-width="0.5"/>
  <rect x="34" y="42" width="4" height="4" rx="0.5" fill="#80b8d0" stroke="#607890" stroke-width="0.5"/>
  <!-- Ore pile indicator -->
  <g fill="#c89020" opacity="0.7">
    <rect x="48" y="44" width="8" height="5" rx="2"/>
    <rect x="46" y="50" width="12" height="5" rx="2"/>
  </g>
</svg>
