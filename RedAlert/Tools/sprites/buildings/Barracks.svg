<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Main building -->
  <rect x="6" y="22" width="52" height="38" rx="2" fill="#b0b0b0" stroke="#707070" stroke-width="1.5"/>
  <!-- Pitched roof -->
  <polygon points="4,22 32,8 60,22" fill="#909090" stroke="#707070" stroke-width="1.5"/>
  <!-- Antenna/flagpole -->
  <line x1="50" y1="4" x2="50" y2="16" stroke="#606060" stroke-width="1.5"/>
  <!-- Flag -->
  <polygon points="50,4 58,7 50,10" fill="#c04040" opacity="0.8"/>
  <!-- Door -->
  <rect x="24" y="42" width="16" height="18" rx="1" fill="#505050" stroke="#404040" stroke-width="1"/>
  <!-- Door handle -->
  <circle cx="37" cy="52" r="1" fill="#707070"/>
  <!-- Windows row -->
  <rect x="10" y="28" width="6" height="5" rx="0.5" fill="#80b8d0" stroke="#607890" stroke-width="0.5"/>
  <rect x="20" y="28" width="6" height="5" rx="0.5" fill="#80b8d0" stroke="#607890" stroke-width="0.5"/>
  <rect x="38" y="28" width="6" height="5" rx="0.5" fill="#80b8d0" stroke="#607890" stroke-width="0.5"/>
  <rect x="48" y="28" width="6" height="5" rx="0.5" fill="#80b8d0" stroke="#607890" stroke-width="0.5"/>
  <!-- Lower windows -->
  <rect x="10" y="40" width="6" height="5" rx="0.5" fill="#80b8d0" stroke="#607890" stroke-width="0.5"/>
  <rect x="48" y="40" width="6" height="5" rx="0.5" fill="#80b8d0" stroke="#607890" stroke-width="0.5"/>
  <!-- Base step -->
  <rect x="4" y="58" width="56" height="4" rx="1" fill="#909090" stroke="#707070" stroke-width="0.8"/>
</svg>
