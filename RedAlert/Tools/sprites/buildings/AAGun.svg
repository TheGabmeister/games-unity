<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Concrete pad -->
  <rect x="8" y="36" width="48" height="24" rx="2" fill="#a0a0a0" stroke="#707070" stroke-width="1.5"/>
  <!-- Sandbag ring -->
  <g fill="#8a8060" stroke="#706850" stroke-width="0.5" opacity="0.6">
    <ellipse cx="14" cy="52" rx="6" ry="3"/>
    <ellipse cx="26" cy="54" rx="6" ry="3"/>
    <ellipse cx="38" cy="54" rx="6" ry="3"/>
    <ellipse cx="50" cy="52" rx="6" ry="3"/>
  </g>
  <!-- Gun platform -->
  <ellipse cx="32" cy="36" rx="14" ry="6" fill="#808080" stroke="#606060" stroke-width="1"/>
  <!-- Gun mount -->
  <rect x="28" y="28" width="8" height="10" rx="1" fill="#707070" stroke="#505050" stroke-width="1"/>
  <!-- Twin barrels - pointing up/diagonal -->
  <rect x="26" y="4" width="3" height="28" rx="0.5" fill="#606060" stroke="#505050" stroke-width="0.8" transform="rotate(-8,27.5,32)"/>
  <rect x="35" y="4" width="3" height="28" rx="0.5" fill="#606060" stroke="#505050" stroke-width="0.8" transform="rotate(8,36.5,32)"/>
  <!-- Barrel tips -->
  <rect x="25" y="2" width="5" height="3" rx="0.5" fill="#505050" transform="rotate(-8,27.5,3.5)"/>
  <rect x="34" y="2" width="5" height="3" rx="0.5" fill="#505050" transform="rotate(8,36.5,3.5)"/>
  <!-- Gun shield -->
  <path d="M22,30 Q32,26 42,30" fill="#707070" stroke="#606060" stroke-width="1"/>
  <!-- Ammo box -->
  <rect x="42" y="38" width="8" height="6" rx="0.5" fill="#606060" stroke="#505050" stroke-width="0.5"/>
  <!-- Base -->
  <rect x="8" y="58" width="48" height="4" rx="1" fill="#909090" stroke="#707070" stroke-width="0.8"/>
</svg>
