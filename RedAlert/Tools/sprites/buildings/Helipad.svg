<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Concrete pad -->
  <rect x="4" y="16" width="56" height="44" rx="2" fill="#a0a0a0" stroke="#707070" stroke-width="1.5"/>
  <!-- Pad surface markings - circle -->
  <circle cx="32" cy="38" r="18" fill="none" stroke="#808080" stroke-width="1.5"/>
  <!-- H marking -->
  <g stroke="#c0c040" stroke-width="3" opacity="0.8">
    <line x1="24" y1="30" x2="24" y2="46"/>
    <line x1="40" y1="30" x2="40" y2="46"/>
    <line x1="24" y1="38" x2="40" y2="38"/>
  </g>
  <!-- Corner markings -->
  <g stroke="#c0c040" stroke-width="1" opacity="0.6">
    <line x1="8" y1="20" x2="8" y2="26"/>
    <line x1="8" y1="20" x2="14" y2="20"/>
    <line x1="56" y1="20" x2="56" y2="26"/>
    <line x1="56" y1="20" x2="50" y2="20"/>
    <line x1="8" y1="56" x2="8" y2="50"/>
    <line x1="8" y1="56" x2="14" y2="56"/>
    <line x1="56" y1="56" x2="56" y2="50"/>
    <line x1="56" y1="56" x2="50" y2="56"/>
  </g>
  <!-- Small control tower -->
  <rect x="50" y="4" width="10" height="14" rx="1" fill="#b0b0b0" stroke="#707070" stroke-width="1"/>
  <rect x="48" y="4" width="14" height="4" rx="1" fill="#909090" stroke="#707070" stroke-width="0.8"/>
  <!-- Tower window -->
  <rect x="52" y="10" width="6" height="4" rx="0.5" fill="#80b8d0" stroke="#607890" stroke-width="0.5"/>
  <!-- Antenna -->
  <line x1="55" y1="0" x2="55" y2="4" stroke="#606060" stroke-width="1"/>
  <!-- Base edge -->
  <rect x="4" y="58" width="56" height="4" rx="1" fill="#909090" stroke="#707070" stroke-width="0.8"/>
</svg>
