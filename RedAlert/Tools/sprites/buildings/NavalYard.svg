<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Water area -->
  <rect x="2" y="40" width="60" height="22" rx="1" fill="#4070a0" opacity="0.4"/>
  <!-- Water ripples -->
  <g stroke="#4080c0" stroke-width="0.5" opacity="0.4">
    <path d="M4,48 Q12,46 20,48 Q28,50 36,48 Q44,46 52,48 Q56,50 60,48" fill="none"/>
    <path d="M4,54 Q12,52 20,54 Q28,56 36,54 Q44,52 52,54 Q56,56 60,54" fill="none"/>
  </g>
  <!-- Dock platform -->
  <rect x="2" y="28" width="40" height="16" rx="1" fill="#a0a0a0" stroke="#707070" stroke-width="1.5"/>
  <!-- Main building -->
  <rect x="4" y="14" width="36" height="16" rx="2" fill="#b0b0b0" stroke="#707070" stroke-width="1.5"/>
  <!-- Roof -->
  <polygon points="4,14 22,4 40,14" fill="#909090" stroke="#707070" stroke-width="1"/>
  <!-- Pier/dock extensions -->
  <rect x="6" y="42" width="8" height="16" rx="0.5" fill="#8a7a60" stroke="#706050" stroke-width="0.8"/>
  <rect x="18" y="42" width="8" height="16" rx="0.5" fill="#8a7a60" stroke="#706050" stroke-width="0.8"/>
  <!-- Crane -->
  <rect x="44" y="16" width="4" height="28" fill="#808080" stroke="#606060" stroke-width="1"/>
  <rect x="36" y="12" width="20" height="3" rx="0.5" fill="#707070" stroke="#505050" stroke-width="0.8"/>
  <!-- Crane cable -->
  <line x1="40" y1="15" x2="40" y2="32" stroke="#505050" stroke-width="0.6"/>
  <!-- Windows -->
  <rect x="8" y="18" width="4" height="4" rx="0.5" fill="#80b8d0" stroke="#607890" stroke-width="0.5"/>
  <rect x="16" y="18" width="4" height="4" rx="0.5" fill="#80b8d0" stroke="#607890" stroke-width="0.5"/>
  <!-- Bay opening -->
  <rect x="8" y="30" width="14" height="12" rx="1" fill="#505050" stroke="#404040" stroke-width="1"/>
  <!-- Bollards -->
  <circle cx="32" cy="44" r="2" fill="#707070" stroke="#505050" stroke-width="0.5"/>
  <circle cx="32" cy="52" r="2" fill="#707070" stroke="#505050" stroke-width="0.5"/>
</svg>
