<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Concrete base -->
  <rect x="10" y="36" width="44" height="24" rx="2" fill="#a0a0a0" stroke="#707070" stroke-width="1.5"/>
  <!-- Base detail -->
  <rect x="8" y="34" width="48" height="4" rx="1" fill="#909090" stroke="#707070" stroke-width="1"/>
  <!-- Turret ring -->
  <ellipse cx="32" cy="32" rx="16" ry="8" fill="#808080" stroke="#606060" stroke-width="1"/>
  <!-- Turret body -->
  <rect x="22" y="20" width="20" height="16" rx="3" fill="#909090" stroke="#707070" stroke-width="1.5"/>
  <!-- Turret top -->
  <ellipse cx="32" cy="20" rx="10" ry="4" fill="#a0a0a0" stroke="#707070" stroke-width="1"/>
  <!-- Gun barrel -->
  <rect x="30" y="4" width="4" height="20" rx="1" fill="#606060" stroke="#505050" stroke-width="1"/>
  <!-- Barrel tip -->
  <rect x="29" y="2" width="6" height="4" rx="0.5" fill="#505050" stroke="#404040" stroke-width="0.8"/>
  <!-- Muzzle -->
  <ellipse cx="32" cy="2" rx="3" ry="1" fill="#404040"/>
  <!-- Bolts on turret -->
  <g fill="#707070">
    <circle cx="26" cy="28" r="1"/>
    <circle cx="38" cy="28" r="1"/>
  </g>
  <!-- Base -->
  <rect x="8" y="58" width="48" height="4" rx="1" fill="#909090" stroke="#707070" stroke-width="0.8"/>
</svg>
