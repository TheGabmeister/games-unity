<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Water area -->
  <rect x="2" y="44" width="60" height="18" rx="1" fill="#4070a0" opacity="0.4"/>
  <!-- Water ripples -->
  <g stroke="#4080c0" stroke-width="0.5" opacity="0.4">
    <path d="M4,50 Q16,48 28,50 Q40,52 52,50 Q56,48 60,50" fill="none"/>
    <path d="M4,56 Q16,54 28,56 Q40,58 52,56 Q56,54 60,56" fill="none"/>
  </g>
  <!-- Main bunker structure -->
  <rect x="4" y="18" width="56" height="28" rx="2" fill="#909090" stroke="#606060" stroke-width="1.5"/>
  <!-- Heavy roof - bunker style -->
  <rect x="2" y="14" width="60" height="6" rx="1" fill="#808080" stroke="#606060" stroke-width="1.5"/>
  <!-- Arched entrance -->
  <path d="M16,46 L16,34 Q16,26 32,26 Q48,26 48,34 L48,46" fill="#404050" stroke="#505050" stroke-width="1"/>
  <!-- Inner water channel -->
  <rect x="18" y="38" width="28" height="8" fill="#305070" opacity="0.6"/>
  <!-- Side walls - thick concrete -->
  <rect x="4" y="18" width="10" height="28" fill="#909090" stroke="#707070" stroke-width="0.5"/>
  <rect x="50" y="18" width="10" height="28" fill="#909090" stroke="#707070" stroke-width="0.5"/>
  <!-- Reinforcement ribs -->
  <g stroke="#808080" stroke-width="1" opacity="0.5">
    <line x1="6" y1="24" x2="14" y2="24"/>
    <line x1="6" y1="32" x2="14" y2="32"/>
    <line x1="50" y1="24" x2="58" y2="24"/>
    <line x1="50" y1="32" x2="58" y2="32"/>
  </g>
  <!-- Warning light -->
  <circle cx="32" cy="17" r="2" fill="#c04040" opacity="0.7"/>
  <!-- Observation slit -->
  <rect x="20" y="20" width="8" height="2" rx="0.5" fill="#505050"/>
  <rect x="36" y="20" width="8" height="2" rx="0.5" fill="#505050"/>
  <!-- Base -->
  <rect x="2" y="58" width="60" height="4" rx="1" fill="#808080" stroke="#606060" stroke-width="0.8"/>
</svg>
