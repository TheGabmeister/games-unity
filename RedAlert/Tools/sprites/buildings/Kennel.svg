<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Base/ground -->
  <rect x="8" y="40" width="48" height="20" rx="2" fill="#a0a0a0" stroke="#707070" stroke-width="1.5"/>
  <!-- Dog house body -->
  <rect x="14" y="30" width="36" height="26" rx="2" fill="#8a7a60" stroke="#706050" stroke-width="1.5"/>
  <!-- Pitched roof -->
  <polygon points="12,30 32,14 52,30" fill="#706050" stroke="#605040" stroke-width="1.5"/>
  <!-- Door opening (arch) -->
  <path d="M24,56 L24,40 Q24,34 32,34 Q40,34 40,40 L40,56" fill="#404030" stroke="#504030" stroke-width="1"/>
  <!-- Roof ridge line -->
  <line x1="32" y1="14" x2="32" y2="30" stroke="#605040" stroke-width="0.8" opacity="0.5"/>
  <!-- Wood grain detail -->
  <g stroke="#706050" stroke-width="0.4" opacity="0.4">
    <line x1="16" y1="36" x2="22" y2="36"/>
    <line x1="42" y1="36" x2="48" y2="36"/>
    <line x1="16" y1="44" x2="22" y2="44"/>
    <line x1="42" y1="44" x2="48" y2="44"/>
  </g>
  <!-- Base edge -->
  <rect x="6" y="56" width="52" height="4" rx="1" fill="#909090" stroke="#707070" stroke-width="0.8"/>
</svg>
