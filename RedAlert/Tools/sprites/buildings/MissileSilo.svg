<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Underground silo walls -->
  <rect x="10" y="24" width="44" height="36" rx="2" fill="#808080" stroke="#606060" stroke-width="1.5"/>
  <!-- Silo interior (dark) -->
  <rect x="16" y="28" width="32" height="28" rx="1" fill="#404040" stroke="#505050" stroke-width="1"/>
  <!-- Silo doors - opening -->
  <rect x="10" y="22" width="20" height="8" rx="1" fill="#909090" stroke="#707070" stroke-width="1"/>
  <rect x="34" y="22" width="20" height="8" rx="1" fill="#909090" stroke="#707070" stroke-width="1"/>
  <!-- Door seam -->
  <line x1="32" y1="22" x2="32" y2="30" stroke="#505050" stroke-width="1.5"/>
  <!-- Door reinforcement -->
  <g stroke="#808080" stroke-width="0.6" opacity="0.5">
    <line x1="14" y1="26" x2="28" y2="26"/>
    <line x1="36" y1="26" x2="50" y2="26"/>
  </g>
  <!-- Missile visible in silo -->
  <rect x="28" y="18" width="8" height="30" rx="2" fill="#606060" stroke="#505050" stroke-width="1"/>
  <!-- Missile nose cone -->
  <polygon points="28,18 32,8 36,18" fill="#707070" stroke="#505050" stroke-width="0.8"/>
  <!-- Missile tip -->
  <circle cx="32" cy="10" r="2" fill="#c04040" opacity="0.7"/>
  <!-- Missile body stripes -->
  <g stroke="#707070" stroke-width="0.5">
    <line x1="28" y1="30" x2="36" y2="30"/>
    <line x1="28" y1="38" x2="36" y2="38"/>
  </g>
  <!-- Exhaust vents -->
  <rect x="12" y="50" width="6" height="4" rx="0.5" fill="#505050" stroke="#404040" stroke-width="0.5"/>
  <rect x="46" y="50" width="6" height="4" rx="0.5" fill="#505050" stroke="#404040" stroke-width="0.5"/>
  <!-- Concrete surround -->
  <rect x="6" y="20" width="52" height="4" rx="1" fill="#a0a0a0" stroke="#707070" stroke-width="1"/>
  <!-- Base -->
  <rect x="6" y="58" width="52" height="4" rx="1" fill="#a0a0a0" stroke="#707070" stroke-width="0.8"/>
</svg>
