<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Base building -->
  <rect x="8" y="34" width="48" height="26" rx="2" fill="#b0b0b0" stroke="#707070" stroke-width="1.5"/>
  <!-- Dome -->
  <ellipse cx="32" cy="28" rx="22" ry="18" fill="#a0a0a0" stroke="#707070" stroke-width="1.5"/>
  <!-- Dome highlight -->
  <ellipse cx="28" cy="22" rx="10" ry="8" fill="#b0b0b0" opacity="0.4"/>
  <!-- Radar dish -->
  <path d="M28,14 Q32,8 36,14" stroke="#808080" stroke-width="1.5" fill="none"/>
  <!-- Antenna mast -->
  <line x1="32" y1="14" x2="32" y2="4" stroke="#707070" stroke-width="1.5"/>
  <!-- Antenna tip -->
  <circle cx="32" cy="4" r="2" fill="#c04040" stroke="#a03030" stroke-width="0.5"/>
  <!-- Dome base ring -->
  <ellipse cx="32" cy="34" rx="22" ry="4" fill="#909090" stroke="#707070" stroke-width="1"/>
  <!-- Door -->
  <rect x="26" y="44" width="12" height="16" rx="1" fill="#505050" stroke="#404040" stroke-width="1"/>
  <!-- Windows -->
  <rect x="12" y="40" width="4" height="4" rx="0.5" fill="#80b8d0" stroke="#607890" stroke-width="0.5"/>
  <rect x="48" y="40" width="4" height="4" rx="0.5" fill="#80b8d0" stroke="#607890" stroke-width="0.5"/>
  <!-- Base -->
  <rect x="6" y="58" width="52" height="4" rx="1" fill="#909090" stroke="#707070" stroke-width="0.8"/>
</svg>
