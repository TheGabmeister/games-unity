<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Concrete pad -->
  <rect x="6" y="32" width="52" height="28" rx="2" fill="#a0a0a0" stroke="#707070" stroke-width="1.5"/>
  <!-- Launcher base -->
  <rect x="14" y="34" width="36" height="14" rx="2" fill="#808080" stroke="#606060" stroke-width="1"/>
  <!-- Launcher rail - angled -->
  <rect x="18" y="16" width="28" height="6" rx="1" fill="#707070" stroke="#505050" stroke-width="1" transform="rotate(-10,32,19)"/>
  <!-- Missile 1 -->
  <g transform="rotate(-10,32,19)">
    <rect x="20" y="12" width="10" height="4" rx="1" fill="#606060" stroke="#505050" stroke-width="0.8"/>
    <!-- Missile nose -->
    <polygon points="20,12 17,14 20,16" fill="#505050"/>
    <!-- Fins -->
    <polygon points="30,11 32,14 30,14" fill="#606060"/>
    <!-- Warhead tip -->
    <circle cx="18" cy="14" r="1" fill="#c04040" opacity="0.7"/>
  </g>
  <!-- Missile 2 -->
  <g transform="rotate(-10,32,19)">
    <rect x="20" y="20" width="10" height="4" rx="1" fill="#606060" stroke="#505050" stroke-width="0.8"/>
    <polygon points="20,20 17,22 20,24" fill="#505050"/>
    <polygon points="30,19 32,22 30,22" fill="#606060"/>
    <circle cx="18" cy="22" r="1" fill="#c04040" opacity="0.7"/>
  </g>
  <!-- Pivot mount -->
  <rect x="28" y="30" width="8" height="8" rx="1" fill="#707070" stroke="#505050" stroke-width="1"/>
  <!-- Radar dish (small) -->
  <path d="M46,28 Q50,22 54,28" stroke="#707070" stroke-width="1" fill="none"/>
  <line x1="50" y1="28" x2="50" y2="34" stroke="#606060" stroke-width="1"/>
  <!-- Base -->
  <rect x="6" y="58" width="52" height="4" rx="1" fill="#909090" stroke="#707070" stroke-width="0.8"/>
</svg>
