<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Main building - clean Allied look -->
  <rect x="6" y="24" width="52" height="36" rx="2" fill="#b8b8b8" stroke="#707070" stroke-width="1.5"/>
  <!-- Flat roof -->
  <rect x="4" y="20" width="56" height="6" rx="1" fill="#a0a0a0" stroke="#707070" stroke-width="1"/>
  <!-- Antenna array 1 -->
  <line x1="14" y1="4" x2="14" y2="20" stroke="#707070" stroke-width="1.5"/>
  <line x1="10" y1="6" x2="18" y2="6" stroke="#707070" stroke-width="1"/>
  <line x1="11" y1="10" x2="17" y2="10" stroke="#707070" stroke-width="0.8"/>
  <!-- Antenna array 2 -->
  <line x1="50" y1="6" x2="50" y2="20" stroke="#707070" stroke-width="1.5"/>
  <line x1="46" y1="8" x2="54" y2="8" stroke="#707070" stroke-width="1"/>
  <line x1="47" y1="12" x2="53" y2="12" stroke="#707070" stroke-width="0.8"/>
  <!-- Satellite dish -->
  <path d="M28,10 Q32,4 36,10" stroke="#4080c0" stroke-width="1.5" fill="none"/>
  <line x1="32" y1="10" x2="32" y2="20" stroke="#707070" stroke-width="1"/>
  <circle cx="32" cy="8" r="1.5" fill="#4080c0"/>
  <!-- Blue accent stripe -->
  <rect x="6" y="32" width="52" height="3" fill="#4080c0" opacity="0.6"/>
  <!-- Windows - blue tint -->
  <rect x="10" y="38" width="6" height="5" rx="0.5" fill="#80b8d0" stroke="#607890" stroke-width="0.5"/>
  <rect x="20" y="38" width="6" height="5" rx="0.5" fill="#80b8d0" stroke="#607890" stroke-width="0.5"/>
  <rect x="38" y="38" width="6" height="5" rx="0.5" fill="#80b8d0" stroke="#607890" stroke-width="0.5"/>
  <rect x="48" y="38" width="6" height="5" rx="0.5" fill="#80b8d0" stroke="#607890" stroke-width="0.5"/>
  <!-- Door -->
  <rect x="28" y="48" width="10" height="12" rx="1" fill="#505050" stroke="#404040" stroke-width="1"/>
  <!-- Tech panel -->
  <rect x="10" y="48" width="8" height="6" rx="0.5" fill="#4080c0" opacity="0.3" stroke="#4080c0" stroke-width="0.5"/>
  <!-- Base -->
  <rect x="4" y="58" width="56" height="4" rx="1" fill="#909090" stroke="#707070" stroke-width="0.8"/>
</svg>
