<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Concrete floor -->
  <rect x="2" y="24" width="60" height="36" rx="2" fill="#a0a0a0" stroke="#707070" stroke-width="1.5"/>
  <!-- Floor grid pattern -->
  <g stroke="#909090" stroke-width="0.4" opacity="0.4">
    <line x1="2" y1="36" x2="62" y2="36"/>
    <line x1="2" y1="48" x2="62" y2="48"/>
    <line x1="22" y1="24" x2="22" y2="60"/>
    <line x1="42" y1="24" x2="42" y2="60"/>
  </g>
  <!-- Roof structure - partial canopy -->
  <rect x="2" y="20" width="60" height="6" rx="1" fill="#909090" stroke="#707070" stroke-width="1"/>
  <!-- Support pillars -->
  <rect x="4" y="20" width="4" height="40" fill="#808080" stroke="#707070" stroke-width="0.5"/>
  <rect x="56" y="20" width="4" height="40" fill="#808080" stroke="#707070" stroke-width="0.5"/>
  <!-- Wrench/tool symbol -->
  <g transform="translate(32,40)" opacity="0.6">
    <rect x="-10" y="-2" width="20" height="4" rx="1" fill="#707070" transform="rotate(45)"/>
    <rect x="-10" y="-2" width="20" height="4" rx="1" fill="#707070" transform="rotate(-45)"/>
    <circle cx="-8" cy="-8" r="3" fill="none" stroke="#707070" stroke-width="1.5"/>
    <circle cx="8" cy="8" r="3" fill="none" stroke="#707070" stroke-width="1.5"/>
  </g>
  <!-- Repair arm/crane -->
  <rect x="10" y="10" width="3" height="16" fill="#808080" stroke="#606060" stroke-width="0.8"/>
  <rect x="10" y="10" width="20" height="3" rx="0.5" fill="#707070" stroke="#505050" stroke-width="0.8"/>
  <!-- Chevron markings (entry) -->
  <g stroke="#c0c040" stroke-width="1.5" opacity="0.6">
    <polyline points="26,56 32,52 38,56" fill="none"/>
    <polyline points="26,60" fill="none"/>
  </g>
  <!-- Tool rack -->
  <rect x="48" y="28" width="8" height="12" rx="0.5" fill="#808080" stroke="#606060" stroke-width="0.5"/>
  <!-- Base -->
  <rect x="2" y="58" width="60" height="4" rx="1" fill="#909090" stroke="#707070" stroke-width="0.8"/>
</svg>
