<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Tank body -->
  <rect x="14" y="20" width="36" height="26" rx="3" fill="#e0e0e0" stroke="#808080" stroke-width="1.5"/>
  <!-- Treads -->
  <rect x="10" y="18" width="9" height="30" rx="3" fill="#a0a0a0" stroke="#707070" stroke-width="1"/>
  <rect x="45" y="18" width="9" height="30" rx="3" fill="#a0a0a0" stroke="#707070" stroke-width="1"/>
  <!-- Tread details -->
  <g stroke="#808080" stroke-width="0.8" opacity="0.5">
    <line x1="11" y1="24" x2="18" y2="24"/>
    <line x1="11" y1="30" x2="18" y2="30"/>
    <line x1="11" y1="36" x2="18" y2="36"/>
    <line x1="11" y1="42" x2="18" y2="42"/>
    <line x1="46" y1="24" x2="53" y2="24"/>
    <line x1="46" y1="30" x2="53" y2="30"/>
    <line x1="46" y1="36" x2="53" y2="36"/>
    <line x1="46" y1="42" x2="53" y2="42"/>
  </g>
  <!-- Turret -->
  <circle cx="32" cy="34" r="9" fill="#c8c8c8" stroke="#808080" stroke-width="1.5"/>
  <!-- Barrel -->
  <rect x="30" y="10" width="4" height="18" rx="1" fill="#909090" stroke="#707070" stroke-width="1"/>
  <!-- Turret center -->
  <circle cx="32" cy="34" r="3" fill="#b0b0b0" stroke="#808080" stroke-width="0.8"/>
</svg>
