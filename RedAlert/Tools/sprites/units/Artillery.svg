<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Vehicle body (low-profile) -->
  <rect x="12" y="28" width="40" height="20" rx="3" fill="#8b7355" stroke="#6b5535" stroke-width="1.5"/>
  <!-- Treads -->
  <rect x="8" y="26" width="9" height="24" rx="3" fill="#a0a0a0" stroke="#707070" stroke-width="1"/>
  <rect x="47" y="26" width="9" height="24" rx="3" fill="#a0a0a0" stroke="#707070" stroke-width="1"/>
  <!-- Tread details -->
  <g stroke="#808080" stroke-width="0.8" opacity="0.5">
    <line x1="9" y1="32" x2="16" y2="32"/>
    <line x1="9" y1="38" x2="16" y2="38"/>
    <line x1="9" y1="44" x2="16" y2="44"/>
    <line x1="48" y1="32" x2="55" y2="32"/>
    <line x1="48" y1="38" x2="55" y2="38"/>
    <line x1="48" y1="44" x2="55" y2="44"/>
  </g>
  <!-- Gun mount -->
  <rect x="28" y="24" width="12" height="10" rx="2" fill="#7a6545" stroke="#6b5535" stroke-width="1"/>
  <!-- Long barrel (angled up) -->
  <rect x="30" y="4" width="4" height="24" rx="1" fill="#606060" stroke="#404040" stroke-width="1" transform="rotate(-8 32 16)"/>
  <!-- Muzzle brake -->
  <rect x="29" y="4" width="6" height="3" rx="1" fill="#505050" stroke="#404040" stroke-width="0.8" transform="rotate(-8 32 5)"/>
</svg>
