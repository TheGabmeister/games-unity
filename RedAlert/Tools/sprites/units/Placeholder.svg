<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Tank body -->
  <rect x="12" y="18" width="40" height="28" rx="4" fill="#e0e0e0" stroke="#808080" stroke-width="1.5"/>
  <!-- Treads -->
  <rect x="8" y="16" width="10" height="32" rx="3" fill="#a0a0a0" stroke="#707070" stroke-width="1"/>
  <rect x="46" y="16" width="10" height="32" rx="3" fill="#a0a0a0" stroke="#707070" stroke-width="1"/>
  <!-- Tread details -->
  <g stroke="#808080" stroke-width="0.8" opacity="0.6">
    <line x1="9" y1="22" x2="17" y2="22"/>
    <line x1="9" y1="28" x2="17" y2="28"/>
    <line x1="9" y1="34" x2="17" y2="34"/>
    <line x1="9" y1="40" x2="17" y2="40"/>
    <line x1="47" y1="22" x2="55" y2="22"/>
    <line x1="47" y1="28" x2="55" y2="28"/>
    <line x1="47" y1="34" x2="55" y2="34"/>
    <line x1="47" y1="40" x2="55" y2="40"/>
  </g>
  <!-- Turret -->
  <circle cx="32" cy="32" r="10" fill="#c8c8c8" stroke="#808080" stroke-width="1.5"/>
  <!-- Barrel -->
  <rect x="30" y="8" width="4" height="18" rx="1" fill="#909090" stroke="#707070" stroke-width="1"/>
  <!-- Turret center -->
  <circle cx="32" cy="32" r="3" fill="#b0b0b0" stroke="#808080" stroke-width="0.8"/>
</svg>
