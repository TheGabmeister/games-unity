<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Tank body (wider/heavier than light tank) -->
  <rect x="11" y="18" width="42" height="30" rx="4" fill="#8b0000" stroke="#5a0000" stroke-width="1.5"/>
  <!-- Treads (thicker) -->
  <rect x="7" y="16" width="11" height="34" rx="4" fill="#a0a0a0" stroke="#707070" stroke-width="1"/>
  <rect x="46" y="16" width="11" height="34" rx="4" fill="#a0a0a0" stroke="#707070" stroke-width="1"/>
  <!-- Tread details -->
  <g stroke="#808080" stroke-width="0.8" opacity="0.5">
    <line x1="8" y1="22" x2="17" y2="22"/>
    <line x1="8" y1="28" x2="17" y2="28"/>
    <line x1="8" y1="34" x2="17" y2="34"/>
    <line x1="8" y1="40" x2="17" y2="40"/>
    <line x1="8" y1="46" x2="17" y2="46"/>
    <line x1="47" y1="22" x2="56" y2="22"/>
    <line x1="47" y1="28" x2="56" y2="28"/>
    <line x1="47" y1="34" x2="56" y2="34"/>
    <line x1="47" y1="40" x2="56" y2="40"/>
    <line x1="47" y1="46" x2="56" y2="46"/>
  </g>
  <!-- Turret (larger) -->
  <circle cx="32" cy="33" r="12" fill="#a00000" stroke="#5a0000" stroke-width="1.5"/>
  <!-- Dual barrels -->
  <rect x="28" y="6" width="3" height="22" rx="1" fill="#707070" stroke="#505050" stroke-width="1"/>
  <rect x="33" y="6" width="3" height="22" rx="1" fill="#707070" stroke="#505050" stroke-width="1"/>
  <!-- Turret center -->
  <circle cx="32" cy="33" r="4" fill="#800000" stroke="#5a0000" stroke-width="0.8"/>
</svg>
