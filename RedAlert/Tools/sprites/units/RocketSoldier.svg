<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Body -->
  <ellipse cx="32" cy="36" rx="10" ry="12" fill="#556b2f" stroke="#3e4f22" stroke-width="1.5"/>
  <!-- Helmet -->
  <circle cx="32" cy="22" r="9" fill="#6b8e23" stroke="#556b2f" stroke-width="1.5"/>
  <circle cx="32" cy="22" r="5" fill="#7caa29" stroke="#556b2f" stroke-width="0.8"/>
  <!-- Legs -->
  <rect x="24" y="44" width="5" height="12" rx="2" fill="#4a5d23" stroke="#3e4f22" stroke-width="1"/>
  <rect x="35" y="44" width="5" height="12" rx="2" fill="#4a5d23" stroke="#3e4f22" stroke-width="1"/>
  <!-- Arms -->
  <rect x="16" y="30" width="5" height="10" rx="2" fill="#5f7a2d" stroke="#4a5d23" stroke-width="1" transform="rotate(-10 18 35)"/>
  <rect x="43" y="28" width="5" height="10" rx="2" fill="#5f7a2d" stroke="#4a5d23" stroke-width="1" transform="rotate(10 45 33)"/>
  <!-- Rocket launcher tube -->
  <rect x="43" y="10" width="6" height="26" rx="2" fill="#505050" stroke="#3a3a3a" stroke-width="1" transform="rotate(12 46 23)"/>
  <!-- Rocket tip -->
  <polygon points="46,8 49,8 47.5,3" fill="#cc3333" stroke="#992222" stroke-width="0.8" transform="rotate(12 47.5 6)"/>
</svg>
