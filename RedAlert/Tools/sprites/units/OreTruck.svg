<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Truck body -->
  <rect x="14" y="22" width="36" height="24" rx="3" fill="#d0c080" stroke="#907040" stroke-width="1.5"/>
  <!-- Wheels -->
  <rect x="10" y="20" width="9" height="28" rx="3" fill="#a09070" stroke="#706050" stroke-width="1"/>
  <rect x="45" y="20" width="9" height="28" rx="3" fill="#a09070" stroke="#706050" stroke-width="1"/>
  <!-- Wheel details -->
  <g stroke="#807060" stroke-width="0.8" opacity="0.5">
    <line x1="11" y1="26" x2="18" y2="26"/>
    <line x1="11" y1="32" x2="18" y2="32"/>
    <line x1="11" y1="38" x2="18" y2="38"/>
    <line x1="11" y1="44" x2="18" y2="44"/>
    <line x1="46" y1="26" x2="53" y2="26"/>
    <line x1="46" y1="32" x2="53" y2="32"/>
    <line x1="46" y1="38" x2="53" y2="38"/>
    <line x1="46" y1="44" x2="53" y2="44"/>
  </g>
  <!-- Cab -->
  <rect x="22" y="14" width="20" height="12" rx="2" fill="#c0b070" stroke="#907040" stroke-width="1"/>
  <!-- Windshield -->
  <rect x="26" y="16" width="12" height="6" rx="1" fill="#80b8d0" stroke="#607890" stroke-width="0.8"/>
  <!-- Ore bed -->
  <rect x="18" y="28" width="28" height="14" rx="1" fill="#b0a060" stroke="#907040" stroke-width="1"/>
  <!-- Ore in bed -->
  <g fill="#c89020">
    <rect x="20" y="30" width="8" height="5" rx="2"/>
    <rect x="30" y="29" width="7" height="6" rx="2"/>
    <rect x="22" y="35" width="9" height="5" rx="2"/>
    <rect x="34" y="34" width="8" height="5" rx="2"/>
  </g>
</svg>
