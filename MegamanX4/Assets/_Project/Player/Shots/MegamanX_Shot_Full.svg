<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 64" width="96" height="64">
  <!--
    Fully-charged buster - magenta plasma sphere with trailing streaks.
    Authored facing right (head on +X side).
  -->
  <!-- Outer aura -->
  <ellipse cx="56" cy="32" rx="38" ry="26" fill="#FF80AB" opacity="0.25"/>
  <ellipse cx="58" cy="32" rx="30" ry="20" fill="#FF4081" opacity="0.4"/>
  <!-- Body -->
  <ellipse cx="60" cy="32" rx="22" ry="14" fill="#F06292" stroke="#AD1457" stroke-width="1.5"/>
  <!-- Inner core -->
  <ellipse cx="62" cy="32" rx="14" ry="9" fill="#F8BBD0"/>
  <!-- White-hot center -->
  <ellipse cx="64" cy="30" rx="7" ry="4" fill="#FFFFFF" opacity="0.9"/>
  <!-- Highlight glint -->
  <ellipse cx="62" cy="28" rx="2.5" ry="1.5" fill="#FFFFFF"/>
  <!-- Trailing energy streaks -->
  <ellipse cx="28" cy="32" rx="12" ry="4" fill="#FF80AB" opacity="0.55"/>
  <ellipse cx="14" cy="32" rx="8" ry="2.5" fill="#F8BBD0" opacity="0.4"/>
  <ellipse cx="4" cy="32" rx="4" ry="1.4" fill="#F8BBD0" opacity="0.25"/>
  <!-- Swirl accents -->
  <path d="M 48 24 Q 58 22 66 26" fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <path d="M 52 40 Q 62 42 70 38" fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
</svg>
