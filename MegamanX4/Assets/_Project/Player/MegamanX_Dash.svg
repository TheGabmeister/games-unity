<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" width="64" height="80">
  <!--
    Mega Man X - horizontal dash pose. Body leaning forward, back leg extended
    behind pushing off, lead foot low to the ground, buster tucked along body.
    Character reads as facing left in its default state (matches other poses).
    Same palette as MegamanX_Idle.svg.
  -->

  <!-- ================= BACK LEG (extended, trailing) ================= -->
  <!-- Thigh (trailing up-back) -->
  <path d="M 40 50 L 48 48 L 54 54 L 46 56 Z" fill="#4FC3F7" stroke="#0A2472" stroke-width="0.8"/>
  <!-- Shin trailing further back -->
  <path d="M 54 54 L 46 56 L 52 64 L 60 60 Z" fill="#4FC3F7" stroke="#0A2472" stroke-width="0.8"/>
  <!-- Trailing boot -->
  <path d="M 52 58 L 62 56 L 63 62 L 53 65 Z" fill="#29B6F6" stroke="#0A2472" stroke-width="0.8"/>
  <path d="M 52 58 L 62 56 L 62.5 58.5 L 52.5 60.5 Z" fill="#FFFFFF" stroke="#0A2472" stroke-width="0.5"/>

  <!-- ================= PELVIS / BELT ================= -->
  <path d="M 30 48 L 46 46 L 48 52 L 32 54 Z" fill="#0D47A1" stroke="#0A2472" stroke-width="0.8"/>

  <!-- ================= FRONT LEG (bent forward, low to ground) ================= -->
  <!-- Thigh forward -->
  <path d="M 28 49 L 36 50 L 34 58 L 24 58 Z" fill="#4FC3F7" stroke="#0A2472" stroke-width="0.8"/>
  <!-- Shin extending down/forward -->
  <path d="M 24 58 L 34 58 L 28 66 L 18 66 Z" fill="#4FC3F7" stroke="#0A2472" stroke-width="0.8"/>
  <!-- Lead boot (skidding) -->
  <path d="M 10 64 L 30 62 L 30 70 L 12 73 Z" fill="#29B6F6" stroke="#0A2472" stroke-width="0.8"/>
  <path d="M 10 64 L 30 62 L 30 65 L 11 67 Z" fill="#FFFFFF" stroke="#0A2472" stroke-width="0.5"/>
  <path d="M 12 70 L 30 67 L 30 70 L 12 73 Z" fill="#0D47A1"/>

  <!-- Dust puff under lead boot -->
  <ellipse cx="8" cy="72" rx="5" ry="1.8" fill="#B3E5FC" opacity="0.8"/>
  <ellipse cx="4" cy="74" rx="3" ry="1.2" fill="#B3E5FC" opacity="0.6"/>

  <!-- ================= TORSO (leaning forward) ================= -->
  <!-- Core torso as a leaning parallelogram -->
  <path d="M 22 38 L 42 34 L 46 50 L 26 52 Z" fill="#4FC3F7" stroke="#0A2472" stroke-width="0.8"/>
  <!-- Chest plate -->
  <path d="M 28 40 L 40 37 L 40 48 L 30 50 Z" fill="#B3E5FC" stroke="#0A2472" stroke-width="0.5"/>
  <!-- Chest vent -->
  <path d="M 32 41 L 36 40 L 35 47 Z" fill="#0D47A1"/>

  <!-- ================= BUSTER ARM (tucked along body, trailing) ================= -->
  <!-- Upper arm along back of torso -->
  <path d="M 34 32 L 44 31 L 46 38 L 36 39 Z" fill="#4FC3F7" stroke="#0A2472" stroke-width="0.8"/>
  <!-- Buster barrel pointing back -->
  <path d="M 42 30 L 54 28 L 56 36 L 44 38 Z" fill="#29B6F6" stroke="#0A2472" stroke-width="0.8"/>
  <rect x="43" y="31" width="11" height="1.4" transform="rotate(-10 43 31)" fill="#B3E5FC"/>
  <!-- Muzzle -->
  <ellipse cx="54" cy="30" rx="2.6" ry="4" fill="#0D47A1" stroke="#0A2472" stroke-width="0.8"
           transform="rotate(80 54 30)"/>
  <ellipse cx="54" cy="30" rx="1.3" ry="2.3" fill="#0A2472"
           transform="rotate(80 54 30)"/>

  <!-- ================= FIST ARM (forward, leading) ================= -->
  <path d="M 18 38 L 26 36 L 28 44 L 20 46 Z" fill="#4FC3F7" stroke="#0A2472" stroke-width="0.8"/>
  <rect x="14" y="40" width="8" height="6" rx="1.5" fill="#FFFFFF" stroke="#0A2472" stroke-width="0.8"
        transform="rotate(-10 18 42)"/>
  <line x1="15" y1="42" x2="22" y2="41" stroke="#0A2472" stroke-width="0.6"/>

  <!-- ================= SHOULDER PADS ================= -->
  <!-- Back shoulder (bigger, on trailing side) -->
  <path d="M 34 28 Q 36 24 42 24 Q 48 24 48 30 L 46 36 L 34 36 Z"
        fill="#29B6F6" stroke="#0A2472" stroke-width="0.8"/>
  <path d="M 37 26 Q 40 25 44 26" fill="none" stroke="#B3E5FC" stroke-width="1" stroke-linecap="round"/>
  <!-- Front shoulder -->
  <path d="M 22 32 Q 22 28 26 28 Q 30 28 30 34 L 28 40 L 22 40 Z"
        fill="#29B6F6" stroke="#0A2472" stroke-width="0.8"/>

  <!-- ================= NECK ================= -->
  <path d="M 26 34 L 32 33 L 32.5 36 L 26.5 37 Z" fill="#FFE0B2" stroke="#0A2472" stroke-width="0.5"/>

  <!-- ================= HEAD (forward, low, leaning) ================= -->
  <!-- Face -->
  <path d="M 6 26 L 24 22 Q 26 32 24 36 Q 14 40 6 34 Z"
        fill="#FFE0B2" stroke="#0A2472" stroke-width="0.8"/>
  <!-- Helmet crown -->
  <path d="M 6 24 Q 4 14 12 12 Q 22 10 26 18 L 28 26 L 26 28 L 6 32 Z"
        fill="#4FC3F7" stroke="#0A2472" stroke-width="0.8"/>
  <!-- Helmet lip -->
  <path d="M 6 26 L 26 22 L 26.5 24 L 6.5 28 Z" fill="#0D47A1" stroke="#0A2472" stroke-width="0.5"/>
  <!-- Forehead gem -->
  <path d="M 14 14 L 19 13 L 18 19 Z" fill="#E53935" stroke="#0A2472" stroke-width="0.5"/>
  <path d="M 15 15 L 16.5 14.8 L 16.2 16.5 Z" fill="#FFCDD2"/>
  <!-- Ear pod (visible one, back) -->
  <circle cx="26" cy="20" r="2.4" fill="#FDD835" stroke="#0A2472" stroke-width="0.7"/>
  <circle cx="26" cy="20" r="0.9" fill="#F57F17"/>
  <!-- Eyes (looking forward = viewer's left) -->
  <rect x="9" y="27" width="3.6" height="3.2" rx="0.4" fill="#00E676" stroke="#0A2472" stroke-width="0.4"
        transform="rotate(-10 9 27)"/>
  <rect x="16" y="26" width="3.6" height="3.2" rx="0.4" fill="#00E676" stroke="#0A2472" stroke-width="0.4"
        transform="rotate(-10 16 26)"/>
  <rect x="9.3" y="27.4" width="1" height="1.2" fill="#FFFFFF" transform="rotate(-10 9.3 27.4)"/>
  <rect x="16.3" y="26.4" width="1" height="1.2" fill="#FFFFFF" transform="rotate(-10 16.3 26.4)"/>
  <!-- Mouth, determined -->
  <path d="M 12 33 L 18 32" stroke="#0A2472" stroke-width="0.8" stroke-linecap="round" fill="none"/>

  <!-- Motion streak -->
  <path d="M 30 42 L 50 40" stroke="#B3E5FC" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>
  <path d="M 34 46 L 52 44" stroke="#B3E5FC" stroke-width="0.6" stroke-linecap="round" opacity="0.5"/>
</svg>
