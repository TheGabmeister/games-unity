<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" width="64" height="80">
  <g transform="translate(64 0) scale(-1 1)">
  <!--
    Mega Man X - rising / jumping pose. Default orientation: facing right (+X).
    Artwork is authored facing left and mirrored by the wrapping <g>.
    Legs tucked up with knees forward,
    buster arm raised up-forward, other arm pulled back for counterbalance.
    Same palette as MegamanX_Idle.svg.
  -->

  <!-- ================= LEGS (bent, tucked) ================= -->
  <!-- Character's left thigh (viewer's right) - angled forward-down -->
  <path d="M 34 47 L 42 47 L 46 57 L 36 58 Z" fill="#4FC3F7" stroke="#0A2472" stroke-width="0.8"/>
  <!-- Shin folded back -->
  <path d="M 36 58 L 46 57 L 44 66 L 36 66 Z" fill="#4FC3F7" stroke="#0A2472" stroke-width="0.8"/>
  <!-- Boot -->
  <rect x="34" y="65" width="12" height="9" rx="2" fill="#29B6F6" stroke="#0A2472" stroke-width="0.8"/>
  <rect x="34" y="65" width="12" height="2.5" fill="#FFFFFF" stroke="#0A2472" stroke-width="0.8"/>
  <rect x="34" y="71.5" width="12" height="2.5" fill="#0D47A1"/>

  <!-- Character's right thigh (viewer's left) - bent forward, slightly higher -->
  <path d="M 22 47 L 30 47 L 30 56 L 18 58 Z" fill="#4FC3F7" stroke="#0A2472" stroke-width="0.8"/>
  <!-- Shin -->
  <path d="M 18 58 L 30 56 L 28 64 L 18 66 Z" fill="#4FC3F7" stroke="#0A2472" stroke-width="0.8"/>
  <!-- Boot -->
  <rect x="16" y="65" width="12" height="9" rx="2" fill="#29B6F6" stroke="#0A2472" stroke-width="0.8"/>
  <rect x="16" y="65" width="12" height="2.5" fill="#FFFFFF" stroke="#0A2472" stroke-width="0.8"/>
  <rect x="16" y="71.5" width="12" height="2.5" fill="#0D47A1"/>

  <!-- Knee highlights -->
  <circle cx="42" cy="56" r="1.4" fill="#B3E5FC"/>
  <circle cx="22" cy="56" r="1.4" fill="#B3E5FC"/>

  <!-- ================= PELVIS / BELT ================= -->
  <rect x="20" y="44" width="24" height="5" fill="#0D47A1" stroke="#0A2472" stroke-width="0.8"/>

  <!-- ================= TORSO ================= -->
  <path d="M 20 28 Q 20 26 22 26 L 42 26 Q 44 26 44 28 L 44 44 L 20 44 Z"
        fill="#4FC3F7" stroke="#0A2472" stroke-width="0.8"/>
  <path d="M 26 29 L 38 29 L 36 40 L 28 40 Z" fill="#B3E5FC" stroke="#0A2472" stroke-width="0.5"/>
  <path d="M 30 31 L 34 31 L 32 38 Z" fill="#0D47A1"/>

  <!-- ================= ARMS ================= -->
  <!-- Buster arm raised up-forward (rotated around shoulder) -->
  <g transform="rotate(-60 19 30)">
    <rect x="16" y="31" width="6" height="8" rx="1.2" fill="#4FC3F7" stroke="#0A2472" stroke-width="0.8"/>
    <path d="M 13 38 L 25 38 L 26 48 L 12 48 Z" fill="#29B6F6" stroke="#0A2472" stroke-width="0.8"/>
    <rect x="14" y="40" width="11" height="1.4" fill="#B3E5FC"/>
    <ellipse cx="19" cy="48.5" rx="7" ry="2.2" fill="#0D47A1" stroke="#0A2472" stroke-width="0.8"/>
    <ellipse cx="19" cy="48.5" rx="4" ry="1.3" fill="#0A2472"/>
  </g>

  <!-- Fist arm pulled back, bent upward -->
  <rect x="43" y="31" width="6" height="10" rx="1.2" fill="#4FC3F7" stroke="#0A2472" stroke-width="0.8"/>
  <rect x="42" y="40" width="8" height="5" rx="1.5" fill="#FFFFFF" stroke="#0A2472" stroke-width="0.8"/>
  <line x1="43.5" y1="42.5" x2="48.5" y2="42.5" stroke="#0A2472" stroke-width="0.6"/>

  <!-- ================= SHOULDER PADS ================= -->
  <path d="M 12 26 Q 12 22 17 22 Q 22 22 22 28 L 22 32 L 12 32 Z"
        fill="#29B6F6" stroke="#0A2472" stroke-width="0.8"/>
  <path d="M 40 28 Q 40 22 45 22 Q 50 22 50 26 L 50 32 L 40 32 Z"
        fill="#29B6F6" stroke="#0A2472" stroke-width="0.8"/>
  <path d="M 14 24 Q 16 23 19 24" fill="none" stroke="#B3E5FC" stroke-width="1" stroke-linecap="round"/>
  <path d="M 43 24 Q 46 23 48 24" fill="none" stroke="#B3E5FC" stroke-width="1" stroke-linecap="round"/>

  <!-- ================= NECK ================= -->
  <rect x="29" y="24" width="6" height="3" fill="#FFE0B2" stroke="#0A2472" stroke-width="0.5"/>

  <!-- ================= HEAD ================= -->
  <path d="M 24 10 L 40 10 L 40 20 Q 40 24 32 25 Q 24 24 24 20 Z"
        fill="#FFE0B2" stroke="#0A2472" stroke-width="0.8"/>
  <path d="M 22 0 Q 22 -2 32 -2 Q 42 -2 42 0 L 44 10 L 44 14 L 20 14 L 20 10 Z"
        fill="#4FC3F7" stroke="#0A2472" stroke-width="0.8"/>
  <rect x="22" y="9" width="20" height="2.2" fill="#0D47A1" stroke="#0A2472" stroke-width="0.5"/>
  <path d="M 29.5 1 L 34.5 1 L 32 7 Z" fill="#E53935" stroke="#0A2472" stroke-width="0.5"/>
  <path d="M 30.5 2 L 32 2 L 31.5 4 Z" fill="#FFCDD2"/>
  <circle cx="19" cy="12" r="2.4" fill="#FDD835" stroke="#0A2472" stroke-width="0.7"/>
  <circle cx="45" cy="12" r="2.4" fill="#FDD835" stroke="#0A2472" stroke-width="0.7"/>
  <circle cx="19" cy="12" r="0.9" fill="#F57F17"/>
  <circle cx="45" cy="12" r="0.9" fill="#F57F17"/>
  <rect x="26" y="15" width="3.2" height="4" rx="0.4" fill="#00E676" stroke="#0A2472" stroke-width="0.4"/>
  <rect x="34.8" y="15" width="3.2" height="4" rx="0.4" fill="#00E676" stroke="#0A2472" stroke-width="0.4"/>
  <rect x="26.4" y="15.4" width="0.9" height="1.2" fill="#FFFFFF"/>
  <rect x="35.2" y="15.4" width="0.9" height="1.2" fill="#FFFFFF"/>
  <path d="M 30 22 Q 32 22.8 34 22" fill="none" stroke="#0A2472" stroke-width="0.8" stroke-linecap="round"/>
  </g>
</svg>
