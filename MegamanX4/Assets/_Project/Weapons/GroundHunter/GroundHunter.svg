<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 24" width="48" height="24">
  <!--
    Ground Hunter - Jet Stingray's weapon; a homing missile that slides
    along the ground and tracks the nearest enemy.
    Authored facing right: warhead/nose cone on +X, fins + exhaust flame on -X.
    Body sits on the lower half so the sprite hugs the floor when spawned.
    Palette (blue, to match Jet Stingray's color tint):
      sky-pale  #E1F5FE   sky-light #B3E5FC   sky-mid   #4FC3F7
      sky-body  #0288D1   sky-deep  #01579B   white     #FFFFFF
      metal     #455A64   metal-hi  #90A4AE
      flame-hot #FFF59D   flame-mid #FFB74D   flame-deep #FF7043
  -->

  <!-- Exhaust flame trail (behind the missile, -X side) -->
  <path d="M 0 12 L 8 10 L 12 14 L 8 18 L 0 14 Z"
        fill="#FF7043" opacity="0.6"/>
  <path d="M 2 12 L 8 11 L 11 14 L 8 17 L 2 14 Z"
        fill="#FFB74D" opacity="0.85"/>
  <path d="M 4 13 L 8 12 L 10 14 L 8 16 L 4 14 Z"
        fill="#FFF59D" opacity="0.95"/>

  <!-- Sparks ejecting from the exhaust -->
  <circle cx="1" cy="11" r="0.6" fill="#FFF59D" opacity="0.9"/>
  <circle cx="3" cy="16" r="0.5" fill="#FFB74D" opacity="0.85"/>

  <!-- Outer glow envelope beneath the missile -->
  <ellipse cx="26" cy="15" rx="18" ry="4" fill="#B3E5FC" opacity="0.3"/>

  <!-- Rear tail fins (X-fin: upper + lower triangles at -X end of body) -->
  <path d="M 10 13 L 16 6 L 16 13 Z"
        fill="#0288D1" stroke="#01579B" stroke-width="0.8"/>
  <path d="M 10 15 L 16 22 L 16 15 Z"
        fill="#0288D1" stroke="#01579B" stroke-width="0.8"/>
  <path d="M 12 12 L 16 8 L 16 12 Z" fill="#4FC3F7" opacity="0.9"/>
  <path d="M 12 16 L 16 20 L 16 16 Z" fill="#4FC3F7" opacity="0.9"/>

  <!-- Main missile body (cylindrical fuselage, tapering to pointed nose on +X) -->
  <path d="M 12 11 L 34 11 L 44 14 L 34 17 L 12 17 Z"
        fill="#0288D1" stroke="#01579B" stroke-width="1"/>

  <!-- Mid-tone dorsal stripe -->
  <path d="M 14 12 L 33 12 L 41 14 L 33 16 L 14 16 Z"
        fill="#4FC3F7" opacity="0.85"/>

  <!-- Bright upper highlight (sheen along top of fuselage) -->
  <path d="M 14 12.5 L 32 12.5 L 38 13.5 L 32 13.5 L 14 13.5 Z"
        fill="#E1F5FE" opacity="0.85"/>

  <!-- Nose cone bright tip -->
  <path d="M 38 13 L 44 14 L 38 15 Z"
        fill="#B3E5FC" opacity="0.95"/>

  <!-- Seeker sensor bulge on the nose -->
  <circle cx="36" cy="14" r="1.6" fill="#01579B"/>
  <circle cx="36.3" cy="13.7" r="0.9" fill="#4FC3F7"/>
  <circle cx="36.5" cy="13.5" r="0.4" fill="#FFFFFF"/>

  <!-- Body segment / rivet rings -->
  <path d="M 20 11 L 20 17 M 26 11 L 26 17 M 31 11 L 31 17"
        stroke="#01579B" stroke-width="0.5" opacity="0.9"/>

  <!-- Warhead band (identifier stripe near the nose) -->
  <path d="M 32 11 L 34 11 L 34 17 L 32 17 Z"
        fill="#FFB74D" opacity="0.9"/>

  <!-- Small ground skid dust beneath the missile -->
  <ellipse cx="20" cy="22" rx="5" ry="0.8" fill="#B3E5FC" opacity="0.45"/>
  <ellipse cx="32" cy="22" rx="4" ry="0.7" fill="#B3E5FC" opacity="0.45"/>
</svg>
