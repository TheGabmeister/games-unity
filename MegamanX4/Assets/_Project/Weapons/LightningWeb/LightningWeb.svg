<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!--
    Lightning Web - Web Spider's weapon; a crackling electric orb.
    Authored facing right: bright leading charge on +X, trailing sparks on -X.
    On impact it spawns a web of electricity (separate behavior, not this asset).
    Palette (yellow-electric with blue crackle):
      spark-pale  #FFF9C4   spark-light #FFF176   spark-mid   #FFEE58
      spark-body  #FDD835   spark-deep  #F9A825   elec-blue   #42A5F5
      white       #FFFFFF
  -->

  <!-- Outer electric aura -->
  <ellipse cx="26" cy="24" rx="22" ry="20" fill="#FFF176" opacity="0.2"/>
  <ellipse cx="26" cy="24" rx="16" ry="14" fill="#FFEE58" opacity="0.3"/>

  <!-- Trailing sparks (-X side) -->
  <path d="M 2 20 L 8 22 L 4 24 L 10 26 L 2 28"
        fill="none" stroke="#42A5F5" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <path d="M 6 16 L 12 19 L 8 21"
        fill="none" stroke="#FDD835" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <path d="M 6 32 L 12 29 L 8 27"
        fill="none" stroke="#FDD835" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>

  <!-- Crackling lightning bolts radiating from center -->
  <path d="M 26 8 L 24 16 L 28 18 L 26 22"
        fill="none" stroke="#42A5F5" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <path d="M 40 14 L 34 18 L 36 22 L 30 24"
        fill="none" stroke="#42A5F5" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <path d="M 40 34 L 34 30 L 36 26 L 30 24"
        fill="none" stroke="#42A5F5" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <path d="M 26 40 L 24 32 L 28 30 L 26 26"
        fill="none" stroke="#42A5F5" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>

  <!-- Main orb body -->
  <circle cx="28" cy="24" r="10" fill="#FDD835" stroke="#F9A825" stroke-width="1.2"/>

  <!-- Inner bright core -->
  <circle cx="28" cy="24" r="6" fill="#FFEE58"/>
  <circle cx="28" cy="24" r="3" fill="#FFF9C4"/>

  <!-- White-hot center -->
  <circle cx="29" cy="23" r="1.5" fill="#FFFFFF" opacity="0.95"/>

  <!-- Highlight glint -->
  <ellipse cx="26" cy="20" rx="2.5" ry="1.5" fill="#FFFFFF" opacity="0.8"/>

  <!-- Outer spark tips -->
  <circle cx="26" cy="6" r="0.8" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="42" cy="14" r="0.8" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="42" cy="34" r="0.8" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="26" cy="42" r="0.8" fill="#FFFFFF" opacity="0.85"/>
</svg>
