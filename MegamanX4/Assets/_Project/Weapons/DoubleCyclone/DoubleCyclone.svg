<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!--
    Double Cyclone - Storm Owl's weapon; a small swirling wind vortex.
    Authored facing right: funnel tip on +X, wide swirl on -X.
    Two of these are spawned at opposing diagonal angles.
    Palette (green-teal, wind energy):
      wind-pale  #E8F5E9   wind-light #A5D6A7   wind-mid   #66BB6A
      wind-body  #43A047   wind-deep  #2E7D32   white      #FFFFFF
  -->

  <!-- Outer glow aura -->
  <ellipse cx="24" cy="24" rx="22" ry="18" fill="#A5D6A7" opacity="0.25"/>

  <!-- Trailing swirl streaks (-X side) -->
  <path d="M 4 18 Q 12 14, 18 18" fill="none" stroke="#A5D6A7" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <path d="M 2 24 Q 10 20, 16 24" fill="none" stroke="#66BB6A" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <path d="M 4 30 Q 12 34, 18 30" fill="none" stroke="#A5D6A7" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>

  <!-- Outer vortex ring -->
  <path d="M 14 10 Q 38 6, 42 24 Q 38 42, 14 38 Q 22 32, 22 24 Q 22 16, 14 10 Z"
        fill="#43A047" stroke="#2E7D32" stroke-width="1.2" opacity="0.9"/>

  <!-- Inner vortex ring (brighter, narrower) -->
  <path d="M 18 14 Q 34 10, 38 24 Q 34 38, 18 34 Q 24 30, 24 24 Q 24 18, 18 14 Z"
        fill="#66BB6A" opacity="0.85"/>

  <!-- Bright center core -->
  <ellipse cx="28" cy="24" rx="6" ry="5" fill="#A5D6A7" opacity="0.9"/>
  <ellipse cx="30" cy="24" rx="3.5" ry="3" fill="#E8F5E9" opacity="0.9"/>

  <!-- Swirl accent lines (rotating wind curves) -->
  <path d="M 20 16 Q 30 12, 36 20" fill="none" stroke="#E8F5E9" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <path d="M 20 32 Q 30 36, 36 28" fill="none" stroke="#E8F5E9" stroke-width="1" stroke-linecap="round" opacity="0.7"/>

  <!-- Leading-edge sparkles (+X side) -->
  <circle cx="40" cy="24" r="1.2" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="36" cy="16" r="0.7" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="36" cy="32" r="0.7" fill="#FFFFFF" opacity="0.8"/>
</svg>
