<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!--
    Rising Fire - Magma Dragoon's weapon; a compact fireball projectile.
    Authored facing right: flame head on +X, trailing embers on -X.
    The spawner rotates the transform upward for the rising variant.
    Palette (red-orange-yellow, volcanic fire):
      flame-pale  #FFF9C4   flame-light #FFCC80   flame-mid   #FF9800
      flame-body  #F44336   flame-deep  #B71C1C   ember       #FF5722
      white       #FFFFFF
  -->

  <!-- Outer heat shimmer -->
  <ellipse cx="26" cy="24" rx="22" ry="18" fill="#FF9800" opacity="0.2"/>
  <ellipse cx="28" cy="24" rx="16" ry="13" fill="#F44336" opacity="0.25"/>

  <!-- Trailing embers (-X side) -->
  <circle cx="4" cy="20" r="1.2" fill="#FF5722" opacity="0.6"/>
  <circle cx="6" cy="28" r="1" fill="#FF9800" opacity="0.55"/>
  <circle cx="8" cy="22" r="0.8" fill="#FFCC80" opacity="0.5"/>
  <circle cx="10" cy="30" r="0.7" fill="#FF5722" opacity="0.45"/>

  <!-- Trailing flame wisps -->
  <path d="M 6 24 Q 10 20, 14 22 Q 12 24, 14 26 Q 10 28, 6 24 Z"
        fill="#FF9800" opacity="0.5"/>
  <path d="M 10 24 Q 14 21, 18 23 Q 16 24, 18 26 Q 14 27, 10 24 Z"
        fill="#FF5722" opacity="0.6"/>

  <!-- Outer flame envelope -->
  <path d="M 16 14 Q 22 6, 34 10 Q 44 16, 44 24 Q 44 32, 34 38 Q 22 42, 16 34 Q 20 28, 20 24 Q 20 20, 16 14 Z"
        fill="#F44336" stroke="#B71C1C" stroke-width="1.2"/>

  <!-- Mid-tone flame body -->
  <path d="M 20 16 Q 26 10, 34 14 Q 40 18, 40 24 Q 40 30, 34 34 Q 26 38, 20 32 Q 24 28, 24 24 Q 24 20, 20 16 Z"
        fill="#FF5722" opacity="0.9"/>

  <!-- Inner hot core -->
  <ellipse cx="32" cy="24" rx="8" ry="7" fill="#FF9800" opacity="0.9"/>
  <ellipse cx="33" cy="24" rx="5" ry="4.5" fill="#FFCC80" opacity="0.9"/>

  <!-- White-hot center -->
  <ellipse cx="34" cy="23" rx="3" ry="2.5" fill="#FFF9C4" opacity="0.95"/>
  <ellipse cx="35" cy="22" rx="1.5" ry="1" fill="#FFFFFF" opacity="0.95"/>

  <!-- Flame lick accents -->
  <path d="M 36 14 Q 40 10, 42 16" fill="none" stroke="#FFCC80" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <path d="M 36 34 Q 40 38, 42 32" fill="none" stroke="#FFCC80" stroke-width="1" stroke-linecap="round" opacity="0.7"/>

  <!-- Leading-edge sparkles -->
  <circle cx="42" cy="24" r="1.2" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="38" cy="14" r="0.7" fill="#FFF9C4" opacity="0.85"/>
  <circle cx="38" cy="34" r="0.7" fill="#FFF9C4" opacity="0.85"/>
</svg>
