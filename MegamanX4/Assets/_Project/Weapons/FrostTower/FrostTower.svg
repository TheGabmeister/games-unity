<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 128" width="48" height="128">
  <!--
    Frost Tower - tall jagged ice pillar with crystalline shards.
    Spawned at player's feet; symmetric about Y axis.
    Palette:
      ice-pale  #E0F7FA   ice-light #B3E5FC   ice-mid   #81D4FA
      ice-body  #4FC3F7   ice-deep  #0288D1   frost     #FFFFFF
  -->

  <!-- Outer glow aura -->
  <ellipse cx="24" cy="72" rx="26" ry="62" fill="#B3E5FC" opacity="0.2"/>
  <ellipse cx="24" cy="72" rx="18" ry="54" fill="#81D4FA" opacity="0.25"/>

  <!-- Main pillar body (jagged crystal spire) -->
  <path d="M 24 4 L 32 18 L 28 32 L 36 54 L 30 72 L 38 96 L 42 124 L 6 124 L 10 96 L 18 72 L 12 54 L 20 32 L 16 18 Z"
        fill="#4FC3F7" stroke="#0288D1" stroke-width="1.2"/>

  <!-- Mid-tone facet (lighter inner crystal, follows body shape slightly narrower) -->
  <path d="M 24 10 L 29 20 L 26 34 L 33 56 L 28 72 L 34 96 L 38 122 L 10 122 L 14 96 L 20 72 L 15 56 L 22 34 L 19 20 Z"
        fill="#81D4FA" opacity="0.75"/>

  <!-- Bright center highlight stripe -->
  <path d="M 24 12 L 26 54 L 28 122 L 20 122 L 22 54 Z"
        fill="#E0F7FA" opacity="0.85"/>

  <!-- Left base shard -->
  <path d="M 2 124 L 8 108 L 14 124 Z"
        fill="#81D4FA" stroke="#0288D1" stroke-width="0.9"/>
  <path d="M 5 122 L 8 112 L 11 122 Z" fill="#B3E5FC" opacity="0.8"/>

  <!-- Right base shard -->
  <path d="M 34 124 L 40 108 L 46 124 Z"
        fill="#81D4FA" stroke="#0288D1" stroke-width="0.9"/>
  <path d="M 37 122 L 40 112 L 43 122 Z" fill="#B3E5FC" opacity="0.8"/>

  <!-- Scattered frost sparkles along the pillar -->
  <circle cx="20" cy="40" r="1" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="29" cy="66" r="1.2" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="22" cy="92" r="1" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="30" cy="24" r="0.7" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="18" cy="110" r="0.9" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="32" cy="108" r="0.7" fill="#FFFFFF" opacity="0.85"/>

  <!-- Top sparkle (4-point star) -->
  <path d="M 24 0 L 25.5 5 L 30.5 6.5 L 25.5 8 L 24 13 L 22.5 8 L 17.5 6.5 L 22.5 5 Z"
        fill="#FFFFFF" opacity="0.95"/>

  <!-- Ground ice debris chunks at the base -->
  <path d="M 0 128 L 3 122 L 7 128 Z"
        fill="#4FC3F7" stroke="#0288D1" stroke-width="0.8"/>
  <path d="M 41 128 L 45 122 L 48 128 Z"
        fill="#4FC3F7" stroke="#0288D1" stroke-width="0.8"/>
</svg>
