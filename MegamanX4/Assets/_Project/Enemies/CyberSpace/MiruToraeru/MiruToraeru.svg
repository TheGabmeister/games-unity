<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!--
    Miru Toraeru - cyber phantom that fades in/out. Authored facing right.
    Digital glitch-style pixel spirit with glowing eye cluster on +X (leading edge).
    Palette:
      core-void   #0A0A1A   core-deep   #1A0A2E   shell-dark  #2E1A4A
      glow-pale   #B39DDB   glow-hot    #7C4DFF   pixel-cyan  #18FFFF
      eye-core    #FFEA00   glitch-red  #FF1744
  -->

  <!-- Body silhouette: cloaked/digital form. Leans forward (+X). -->
  <path d="M 18 22 Q 12 30, 14 42 Q 16 52, 24 54 L 40 54 Q 48 52, 50 42 Q 52 30, 44 22 Q 36 16, 30 18 Q 22 18, 18 22 Z" fill="#1A0A2E" stroke="#0A0A1A" stroke-width="1.2"/>

  <!-- Inner glow layer -->
  <path d="M 22 26 Q 18 34, 20 44 Q 22 50, 28 50 L 38 50 Q 46 50, 46 40 Q 48 30, 40 24 Q 32 22, 26 24 Z" fill="#2E1A4A" opacity="0.85"/>

  <!-- Forward-facing hood rim (+X side) -->
  <path d="M 38 18 Q 50 22, 50 40" fill="none" stroke="#7C4DFF" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Glitch pixels on body (digital flicker accent) -->
  <g fill="#18FFFF">
    <rect x="22" y="30" width="2" height="2"/>
    <rect x="30" y="40" width="2" height="2"/>
    <rect x="20" y="44" width="2" height="2"/>
    <rect x="36" y="32" width="2" height="2"/>
  </g>
  <g fill="#FF1744">
    <rect x="26" y="36" width="2" height="2"/>
    <rect x="34" y="46" width="2" height="2"/>
  </g>

  <!-- Eye cluster (forward / +X) -->
  <ellipse cx="40" cy="32" rx="5" ry="4" fill="#0A0A1A" stroke="#7C4DFF" stroke-width="0.8"/>
  <circle cx="41" cy="32" r="2.4" fill="#FFEA00"/>
  <circle cx="41.6" cy="31.4" r="0.8" fill="#FFFFFF"/>

  <!-- Trailing tendrils (-X side, like a fading afterimage tail) -->
  <g fill="none" stroke="#7C4DFF" stroke-width="1.4" stroke-linecap="round" opacity="0.75">
    <path d="M 14 44 Q 6 48, 4 54"/>
    <path d="M 16 50 Q 8 54, 2 58"/>
  </g>

  <!-- Outer aura ring -->
  <ellipse cx="32" cy="36" rx="22" ry="20" fill="none" stroke="#B39DDB" stroke-width="1" opacity="0.35"/>
</svg>
