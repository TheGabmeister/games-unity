<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" width="64" height="80">
  <!--
    Kill Fisher - tree-hanging angler enemy. Authored facing right.
    Head/body hang from a leafy clump at the top; the hook is a separate child sprite.
    Palette (jungle green + wood):
      leaf-pale   #A5D6A7   leaf-light  #66BB6A   leaf-mid  #388E3C
      leaf-deep   #1B5E20   wood        #5D4037   wood-light #8D6E63
      body-pale   #FFE082   body-mid    #FFB300   body-deep  #E65100
      eye         #212121   eye-white   #FFFFFF
  -->

  <!-- Canopy leaves hanging from top -->
  <ellipse cx="32" cy="10" rx="26" ry="8" fill="#66BB6A" stroke="#1B5E20" stroke-width="0.8"/>
  <ellipse cx="22" cy="12" rx="10" ry="6" fill="#388E3C"/>
  <ellipse cx="42" cy="12" rx="12" ry="6" fill="#388E3C"/>
  <ellipse cx="32" cy="8"  rx="16" ry="4" fill="#A5D6A7" opacity="0.7"/>

  <!-- Branch / wooden perch -->
  <rect x="16" y="16" width="32" height="6" rx="1" fill="#5D4037" stroke="#3E2723" stroke-width="0.6"/>
  <rect x="16" y="16" width="32" height="1.5" fill="#8D6E63"/>

  <!-- Body dangling from branch -->
  <ellipse cx="32" cy="38" rx="14" ry="16" fill="#FFB300" stroke="#E65100" stroke-width="1"/>
  <ellipse cx="31" cy="35" rx="10" ry="11" fill="#FFE082" opacity="0.7"/>

  <!-- Eye on body -->
  <circle cx="36" cy="32" r="4" fill="#FFFFFF" stroke="#212121" stroke-width="0.6"/>
  <circle cx="37" cy="32" r="2" fill="#212121"/>

  <!-- Mouth -->
  <path d="M 30 44 Q 34 48, 38 44" fill="none" stroke="#212121" stroke-width="1"/>

  <!-- Fishing rod / line attachment at bottom of body -->
  <rect x="30" y="52" width="4" height="4" fill="#5D4037"/>
  <line x1="32" y1="56" x2="32" y2="78" stroke="#424242" stroke-width="1"/>
</svg>
