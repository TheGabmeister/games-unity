<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 48" width="16" height="48">
  <!--
    Kill Fisher hook - dangles below the body. Line + metal hook.
    Authored vertical; the local position in the prefab places the hook under the body.
  -->

  <!-- Fishing line -->
  <line x1="8" y1="0" x2="8" y2="36" stroke="#263238" stroke-width="1.2"/>
  <line x1="8" y1="0" x2="8" y2="36" stroke="#90A4AE" stroke-width="0.4"/>

  <!-- Hook body -->
  <path d="M 8 36 Q 8 44, 4 44 Q 2 44, 2 42 L 4 42 Q 5 42, 5 43 Q 5 44, 6 44"
        fill="none" stroke="#B0BEC5" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Hook barb / highlight -->
  <path d="M 8 36 Q 8 44, 4 44 Q 2 44, 2 42"
        fill="none" stroke="#ECEFF1" stroke-width="1" stroke-linecap="round"/>

  <!-- Tip point -->
  <circle cx="2" cy="42" r="1" fill="#FF3D00"/>
</svg>
