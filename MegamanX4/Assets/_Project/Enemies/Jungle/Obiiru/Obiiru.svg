<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 80" width="48" height="80">
  <!--
    Obiiru - jungle creature on a vine, swings in a pendulum.
    Authored with vine at top, creature body at bottom. The Obiiru.cs script rotates around the top anchor.
    Palette (jungle vine + creature):
      vine-pale   #AED581   vine-mid    #7CB342   vine-deep  #33691E
      body-pale   #D7CCC8   body-mid    #8D6E63   body-deep  #4E342E
      eye         #FFCA28   fang        #FFFFFF   spot       #3E2723
  -->

  <!-- Vine/rope from top down to creature -->
  <line x1="24" y1="0"  x2="24" y2="40" stroke="#7CB342" stroke-width="3"/>
  <line x1="24" y1="0"  x2="24" y2="40" stroke="#AED581" stroke-width="1" opacity="0.8"/>

  <!-- Vine leaves along the way -->
  <ellipse cx="18" cy="12" rx="4" ry="2.5" fill="#7CB342" stroke="#33691E" stroke-width="0.5" transform="rotate(-30 18 12)"/>
  <ellipse cx="30" cy="24" rx="4" ry="2.5" fill="#7CB342" stroke="#33691E" stroke-width="0.5" transform="rotate(30 30 24)"/>

  <!-- Creature body -->
  <ellipse cx="24" cy="56" rx="16" ry="16" fill="#8D6E63" stroke="#4E342E" stroke-width="1.2"/>
  <ellipse cx="22" cy="52" rx="11" ry="10" fill="#D7CCC8" opacity="0.6"/>

  <!-- Spots on body -->
  <circle cx="16" cy="60" r="2" fill="#3E2723"/>
  <circle cx="30" cy="62" r="2" fill="#3E2723"/>
  <circle cx="20" cy="68" r="1.5" fill="#3E2723"/>

  <!-- Eyes -->
  <circle cx="19" cy="54" r="3" fill="#FFFFFF" stroke="#3E2723" stroke-width="0.6"/>
  <circle cx="29" cy="54" r="3" fill="#FFFFFF" stroke="#3E2723" stroke-width="0.6"/>
  <circle cx="19" cy="55" r="1.4" fill="#FFCA28"/>
  <circle cx="29" cy="55" r="1.4" fill="#FFCA28"/>
  <circle cx="19" cy="55" r="0.6" fill="#3E2723"/>
  <circle cx="29" cy="55" r="0.6" fill="#3E2723"/>

  <!-- Fangs -->
  <path d="M 20 64 L 21 68 L 22 64 Z" fill="#FFFFFF"/>
  <path d="M 26 64 L 27 68 L 28 64 Z" fill="#FFFFFF"/>
</svg>
