<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!--
    Spider Core - ceiling-mounted spider that swoops down. Authored with legs splayed, eyes forward-right.
    Palette (dark chitin + red eyes):
      shell-pale  #9E9E9E   shell-light #616161   shell-mid  #424242
      shell-deep  #212121   joint       #4E342E   eye        #E53935
      eye-hot     #FFEB3B
  -->

  <!-- Shadow under body -->
  <ellipse cx="48" cy="60" rx="30" ry="4" fill="#212121" opacity="0.3"/>

  <!-- Legs (8, splayed) -->
  <g stroke="#212121" stroke-width="2" stroke-linecap="round" fill="none">
    <!-- Upper-left legs -->
    <path d="M 36 40 Q 14 20, 4 30"/>
    <path d="M 38 44 Q 16 32, 6 44"/>
    <!-- Lower-left legs -->
    <path d="M 38 52 Q 16 60, 6 58"/>
    <path d="M 40 56 Q 22 72, 14 78"/>
    <!-- Upper-right legs -->
    <path d="M 60 40 Q 82 20, 92 30"/>
    <path d="M 58 44 Q 80 32, 90 44"/>
    <!-- Lower-right legs -->
    <path d="M 58 52 Q 80 60, 90 58"/>
    <path d="M 56 56 Q 74 72, 82 78"/>
  </g>

  <!-- Leg joints -->
  <g fill="#4E342E">
    <circle cx="14" cy="24" r="2"/>
    <circle cx="12" cy="38" r="2"/>
    <circle cx="12" cy="60" r="2"/>
    <circle cx="20" cy="70" r="2"/>
    <circle cx="82" cy="24" r="2"/>
    <circle cx="84" cy="38" r="2"/>
    <circle cx="84" cy="60" r="2"/>
    <circle cx="76" cy="70" r="2"/>
  </g>

  <!-- Abdomen (back) -->
  <ellipse cx="36" cy="48" rx="18" ry="14" fill="#424242" stroke="#212121" stroke-width="1.4"/>
  <ellipse cx="34" cy="44" rx="12" ry="9" fill="#616161" opacity="0.7"/>

  <!-- Head / cephalothorax (front, right) -->
  <ellipse cx="62" cy="48" rx="14" ry="12" fill="#212121" stroke="#000000" stroke-width="1.2"/>
  <ellipse cx="62" cy="46" rx="10" ry="7" fill="#424242" opacity="0.7"/>

  <!-- Eye cluster (forward) -->
  <g fill="#E53935" stroke="#4E342E" stroke-width="0.6">
    <circle cx="68" cy="44" r="3"/>
    <circle cx="70" cy="50" r="2"/>
    <circle cx="64" cy="42" r="2"/>
    <circle cx="64" cy="52" r="2"/>
  </g>
  <circle cx="69" cy="43" r="0.8" fill="#FFEB3B"/>

  <!-- Fangs forward -->
  <path d="M 72 52 L 76 58 L 70 56 Z" fill="#EEEEEE"/>
  <path d="M 74 50 L 78 54 L 72 53 Z" fill="#EEEEEE"/>
</svg>
