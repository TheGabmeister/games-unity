<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 128" width="160" height="128">
  <!--
    Mad Bull 97 - large armored charging mech.
    Authored facing left (charges toward player). Bigger than X.
    Palette (heavy armor brown-red):
      armor-pale  #FFCCBC   armor-light #FF8A65   armor-mid   #F4511E
      armor-body  #BF360C   armor-deep  #7F0000   metal       #455A64
      metal-hi    #90A4AE   eye         #F44336   exhaust     #FFAB40
  -->

  <!-- Rear exhaust pipes -->
  <rect x="130" y="36" width="14" height="8" rx="2" fill="#455A64" stroke="#263238" stroke-width="0.8"/>
  <rect x="130" y="50" width="14" height="8" rx="2" fill="#455A64" stroke="#263238" stroke-width="0.8"/>
  <ellipse cx="148" cy="40" rx="6" ry="4" fill="#FFAB40" opacity="0.6"/>
  <ellipse cx="148" cy="54" rx="6" ry="4" fill="#FFAB40" opacity="0.6"/>
  <ellipse cx="152" cy="40" rx="3" ry="2" fill="#FFF9C4" opacity="0.5"/>
  <ellipse cx="152" cy="54" rx="3" ry="2" fill="#FFF9C4" opacity="0.5"/>

  <!-- Legs / treads -->
  <rect x="24" y="98" width="112" height="22" rx="4" fill="#455A64" stroke="#263238" stroke-width="1"/>
  <rect x="28" y="100" width="104" height="18" rx="3" fill="#37474F"/>
  <!-- Tread segments -->
  <rect x="32" y="102" width="8" height="14" rx="1" fill="#455A64"/>
  <rect x="44" y="102" width="8" height="14" rx="1" fill="#455A64"/>
  <rect x="56" y="102" width="8" height="14" rx="1" fill="#455A64"/>
  <rect x="68" y="102" width="8" height="14" rx="1" fill="#455A64"/>
  <rect x="80" y="102" width="8" height="14" rx="1" fill="#455A64"/>
  <rect x="92" y="102" width="8" height="14" rx="1" fill="#455A64"/>
  <rect x="104" y="102" width="8" height="14" rx="1" fill="#455A64"/>
  <rect x="116" y="102" width="8" height="14" rx="1" fill="#455A64"/>

  <!-- Main body hull -->
  <path d="M 20 40 L 130 30 L 135 68 L 130 100 L 20 100 Z"
        fill="#BF360C" stroke="#7F0000" stroke-width="1.5"/>
  <path d="M 26 44 L 125 34 L 128 66 L 125 96 L 26 96 Z"
        fill="#F4511E" opacity="0.7"/>

  <!-- Armor plate lines -->
  <path d="M 50 34 L 50 98" stroke="#7F0000" stroke-width="0.8" opacity="0.6"/>
  <path d="M 80 32 L 80 98" stroke="#7F0000" stroke-width="0.8" opacity="0.6"/>
  <path d="M 110 32 L 110 98" stroke="#7F0000" stroke-width="0.8" opacity="0.6"/>

  <!-- Upper hull highlight -->
  <path d="M 28 46 L 124 36 L 122 50 L 28 58 Z"
        fill="#FF8A65" opacity="0.5"/>

  <!-- Head / front ram -->
  <path d="M 4 52 L 22 40 L 22 100 L 4 88 Z"
        fill="#BF360C" stroke="#7F0000" stroke-width="1.2"/>
  <path d="M 8 56 L 20 46 L 20 94 L 8 84 Z"
        fill="#F4511E" opacity="0.6"/>

  <!-- Ram horn / bumper -->
  <path d="M 0 60 L 10 54 L 10 86 L 0 80 Z"
        fill="#455A64" stroke="#263238" stroke-width="1"/>
  <path d="M 2 62 L 8 58 L 8 82 L 2 78 Z"
        fill="#90A4AE" opacity="0.5"/>

  <!-- Eye slit -->
  <rect x="10" y="62" width="14" height="6" rx="1" fill="#F44336"/>
  <rect x="12" y="63" width="6" height="4" rx="1" fill="#FFFFFF" opacity="0.5"/>
  <rect x="20" y="63" width="3" height="4" rx="0.5" fill="#FFEB3B" opacity="0.8"/>

  <!-- Top mounted cannon/sensor -->
  <rect x="60" y="22" width="24" height="12" rx="3" fill="#455A64" stroke="#263238" stroke-width="0.8"/>
  <rect x="64" y="24" width="16" height="8" rx="2" fill="#37474F"/>
  <circle cx="72" cy="28" r="3" fill="#F44336" opacity="0.7"/>
  <circle cx="72" cy="28" r="1.5" fill="#FFEB3B" opacity="0.9"/>
</svg>
