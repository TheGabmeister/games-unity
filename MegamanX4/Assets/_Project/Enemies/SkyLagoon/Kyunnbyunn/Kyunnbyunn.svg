<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 48" width="64" height="48">
  <!--
    Kyunnbyunn - small swooping bird enemy.
    Authored facing left (flies toward player). Small relative to X.
    Palette (dark teal-gray, mechanical bird):
      body-pale   #B2DFDB   body-light  #4DB6AC   body-mid    #00897B
      body-deep   #004D40   wing-light  #80CBC4   wing-deep   #00695C
      eye         #F44336   beak        #FFAB40
  -->

  <!-- Tail feathers -->
  <path d="M 52 22 L 62 16 L 60 24 Z" fill="#00897B" stroke="#004D40" stroke-width="0.6"/>
  <path d="M 52 26 L 62 32 L 60 24 Z" fill="#00897B" stroke="#004D40" stroke-width="0.6"/>
  <path d="M 54 24 L 64 20 L 62 24 L 64 28 L 54 24 Z" fill="#4DB6AC" opacity="0.7"/>

  <!-- Left wing (upper, spread) -->
  <path d="M 24 22 L 10 4 L 18 6 L 32 18 Z"
        fill="#00897B" stroke="#004D40" stroke-width="0.8"/>
  <path d="M 26 20 L 14 6 L 20 8 L 30 18 Z"
        fill="#4DB6AC" opacity="0.6"/>

  <!-- Right wing (lower, spread) -->
  <path d="M 24 26 L 10 44 L 18 42 L 32 30 Z"
        fill="#00897B" stroke="#004D40" stroke-width="0.8"/>
  <path d="M 26 28 L 14 42 L 20 40 L 30 30 Z"
        fill="#4DB6AC" opacity="0.6"/>

  <!-- Body -->
  <ellipse cx="32" cy="24" rx="16" ry="8" fill="#00897B" stroke="#004D40" stroke-width="1"/>
  <ellipse cx="30" cy="22" rx="12" ry="5" fill="#4DB6AC" opacity="0.7"/>
  <ellipse cx="28" cy="21" rx="6" ry="3" fill="#B2DFDB" opacity="0.5"/>

  <!-- Head -->
  <ellipse cx="16" cy="22" rx="8" ry="7" fill="#00897B" stroke="#004D40" stroke-width="0.8"/>
  <ellipse cx="15" cy="21" rx="5" ry="4" fill="#4DB6AC" opacity="0.7"/>

  <!-- Eye -->
  <circle cx="12" cy="20" r="3" fill="#F44336" stroke="#B71C1C" stroke-width="0.6"/>
  <circle cx="11" cy="19" r="1.2" fill="#FFFFFF" opacity="0.8"/>

  <!-- Beak -->
  <path d="M 8 22 L 2 21 L 4 24 L 8 24 Z" fill="#FFAB40" stroke="#E65100" stroke-width="0.5"/>

  <!-- Crest -->
  <path d="M 14 16 L 10 10 L 16 14 Z" fill="#4DB6AC" stroke="#004D40" stroke-width="0.5"/>
  <path d="M 18 16 L 16 8 L 20 14 Z" fill="#4DB6AC" stroke="#004D40" stroke-width="0.5"/>
</svg>
