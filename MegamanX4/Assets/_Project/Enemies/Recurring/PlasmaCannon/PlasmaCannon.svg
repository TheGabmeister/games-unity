<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 80" width="96" height="80">
  <!--
    Plasma Cannon - wall-mounted turret with charge socket + forward-firing barrel.
    Authored facing right: wall plate on left (anchor), barrel projects to the right.
    Palette (industrial):
      shell-pale  #B0BEC5   shell-light #78909C   shell-mid  #455A64
      shell-deep  #263238   trim        #FF6D00   trim-light #FFAB40
      socket-deep #4A148C   socket-mid  #7B1FA2
  -->

  <!-- Wall anchor plate -->
  <rect x="0" y="12" width="20" height="56" rx="2" fill="#455A64" stroke="#263238" stroke-width="1"/>
  <g fill="#263238">
    <circle cx="6"  cy="20" r="2"/>
    <circle cx="6"  cy="60" r="2"/>
    <circle cx="16" cy="20" r="2"/>
    <circle cx="16" cy="60" r="2"/>
  </g>

  <!-- Pivot joint -->
  <circle cx="24" cy="40" r="8" fill="#78909C" stroke="#263238" stroke-width="1"/>
  <circle cx="24" cy="40" r="4" fill="#455A64"/>

  <!-- Main body / charge housing -->
  <rect x="26" y="28" width="30" height="24" rx="3" fill="#78909C" stroke="#263238" stroke-width="1.2"/>
  <rect x="29" y="31" width="24" height="18" rx="2" fill="#B0BEC5" opacity="0.7"/>

  <!-- Charge socket (purple aperture in housing) -->
  <circle cx="41" cy="40" r="7" fill="#263238"/>
  <circle cx="41" cy="40" r="5" fill="#4A148C"/>
  <circle cx="41" cy="40" r="3" fill="#7B1FA2"/>
  <circle cx="40" cy="39" r="1" fill="#FFFFFF" opacity="0.8"/>

  <!-- Barrel -->
  <rect x="56" y="34" width="34" height="12" rx="2" fill="#455A64" stroke="#263238" stroke-width="1"/>
  <rect x="56" y="34" width="34" height="3" fill="#78909C"/>
  <rect x="88" y="32" width="6" height="16" rx="1" fill="#263238"/>

  <!-- Barrel cooling fins -->
  <g fill="#263238">
    <rect x="62" y="30" width="2" height="20"/>
    <rect x="68" y="30" width="2" height="20"/>
    <rect x="74" y="30" width="2" height="20"/>
    <rect x="80" y="30" width="2" height="20"/>
  </g>

  <!-- Warning stripe -->
  <rect x="56" y="40" width="34" height="2" fill="#FF6D00"/>
  <rect x="56" y="42" width="34" height="1" fill="#FFAB40" opacity="0.8"/>
</svg>
