<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!--
    Blast Raster - red floating orb with layered glow (radial fire enemy).
    Symmetric; no facing convention required.
    Palette (red/orange glow):
      glow-outer #FF8A80   glow-mid #FF5252   core-hot #FF1744
      core-deep  #B71C1C   rim      #FFCDD2   pupil    #FFFFFF
  -->

  <!-- Outer glow halo -->
  <circle cx="48" cy="48" r="44" fill="#FF8A80" opacity="0.25"/>
  <circle cx="48" cy="48" r="36" fill="#FF5252" opacity="0.4"/>

  <!-- Spike nodes around the body (8-way emitters) -->
  <g fill="#B71C1C" stroke="#4A0E0E" stroke-width="0.8">
    <circle cx="48" cy="8"  r="4"/>
    <circle cx="48" cy="88" r="4"/>
    <circle cx="8"  cy="48" r="4"/>
    <circle cx="88" cy="48" r="4"/>
    <circle cx="19" cy="19" r="3.5"/>
    <circle cx="77" cy="19" r="3.5"/>
    <circle cx="19" cy="77" r="3.5"/>
    <circle cx="77" cy="77" r="3.5"/>
  </g>

  <!-- Main body -->
  <circle cx="48" cy="48" r="24" fill="#FF1744" stroke="#B71C1C" stroke-width="1.5"/>
  <circle cx="48" cy="48" r="20" fill="#FF5252"/>
  <circle cx="48" cy="48" r="14" fill="#FFCDD2" opacity="0.6"/>

  <!-- Core -->
  <circle cx="48" cy="48" r="8" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="48" cy="48" r="5" fill="#FF1744"/>

  <!-- Highlight -->
  <ellipse cx="40" cy="40" rx="6" ry="3" fill="#FFFFFF" opacity="0.5"/>
</svg>
