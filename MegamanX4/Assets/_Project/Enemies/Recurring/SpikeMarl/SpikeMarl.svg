<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!--
    Spike Marl - spiky ceiling mine. Symmetric, no facing direction.
    Small relative to X (~1/3 height).
    Palette (dark metallic with red accents):
      shell-pale  #BDBDBD   shell-light #757575   shell-mid   #616161
      shell-body  #424242   shell-deep  #212121   spike       #F44336
      eye         #FFEB3B
  -->

  <!-- Spikes radiating outward -->
  <path d="M 24 0 L 26 10 L 22 10 Z" fill="#F44336" stroke="#B71C1C" stroke-width="0.5"/>
  <path d="M 24 48 L 26 38 L 22 38 Z" fill="#F44336" stroke="#B71C1C" stroke-width="0.5"/>
  <path d="M 0 24 L 10 22 L 10 26 Z" fill="#F44336" stroke="#B71C1C" stroke-width="0.5"/>
  <path d="M 48 24 L 38 22 L 38 26 Z" fill="#F44336" stroke="#B71C1C" stroke-width="0.5"/>
  <path d="M 7 7 L 14 12 L 12 14 Z" fill="#F44336" stroke="#B71C1C" stroke-width="0.5"/>
  <path d="M 41 7 L 36 12 L 34 14 Z" fill="#F44336" stroke="#B71C1C" stroke-width="0.5"/>
  <path d="M 7 41 L 12 36 L 14 34 Z" fill="#F44336" stroke="#B71C1C" stroke-width="0.5"/>
  <path d="M 41 41 L 36 36 L 34 34 Z" fill="#F44336" stroke="#B71C1C" stroke-width="0.5"/>

  <!-- Main body (spherical shell) -->
  <circle cx="24" cy="24" r="12" fill="#424242" stroke="#212121" stroke-width="1.2"/>
  <circle cx="24" cy="24" r="9" fill="#616161" opacity="0.8"/>
  <circle cx="24" cy="24" r="5" fill="#757575" opacity="0.7"/>

  <!-- Central eye -->
  <circle cx="24" cy="22" r="4" fill="#FFEB3B" stroke="#F57F17" stroke-width="0.8"/>
  <circle cx="24" cy="21" r="2" fill="#F44336"/>
  <circle cx="23" cy="20" r="0.8" fill="#FFFFFF" opacity="0.9"/>

  <!-- Shell highlight -->
  <ellipse cx="20" cy="18" rx="3" ry="2" fill="#BDBDBD" opacity="0.4"/>
</svg>
