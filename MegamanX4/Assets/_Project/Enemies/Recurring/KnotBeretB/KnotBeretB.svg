<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 128" width="96" height="128">
  <!--
    Knot Beret B - blue humanoid soldier with rifle.
    Authored facing left (toward +X-entering player).
    Similar height to X but slimmer.
    Palette (military blue):
      armor-pale  #90CAF9   armor-light #42A5F5   armor-mid   #1E88E5
      armor-body  #1565C0   armor-deep  #0D47A1   skin        #FFCC80
      visor       #F44336   metal       #455A64   metal-hi    #90A4AE
  -->

  <!-- Boots -->
  <rect x="28" y="108" width="18" height="20" rx="3" fill="#1565C0" stroke="#0D47A1" stroke-width="1"/>
  <rect x="50" y="108" width="18" height="20" rx="3" fill="#1565C0" stroke="#0D47A1" stroke-width="1"/>
  <rect x="28" y="108" width="18" height="5" fill="#42A5F5"/>
  <rect x="50" y="108" width="18" height="5" fill="#42A5F5"/>

  <!-- Legs -->
  <rect x="32" y="88" width="12" height="22" fill="#1E88E5" stroke="#0D47A1" stroke-width="0.8"/>
  <rect x="52" y="88" width="12" height="22" fill="#1E88E5" stroke="#0D47A1" stroke-width="0.8"/>

  <!-- Body / torso -->
  <path d="M 28 50 L 68 50 L 66 90 L 30 90 Z" fill="#1565C0" stroke="#0D47A1" stroke-width="1"/>
  <path d="M 32 54 L 64 54 L 62 86 L 34 86 Z" fill="#1E88E5" opacity="0.8"/>
  <!-- Chest plate highlight -->
  <rect x="38" y="58" width="20" height="12" rx="2" fill="#42A5F5" opacity="0.7"/>

  <!-- Belt -->
  <rect x="28" y="84" width="40" height="6" fill="#455A64"/>
  <rect x="44" y="83" width="8" height="8" rx="1" fill="#90A4AE"/>

  <!-- Rifle (held in left hand, pointing left) -->
  <rect x="6" y="58" width="30" height="5" rx="1" fill="#455A64" stroke="#263238" stroke-width="0.8"/>
  <rect x="2" y="56" width="8" height="9" rx="1" fill="#90A4AE"/>
  <rect x="6" y="60" width="4" height="8" fill="#455A64"/>

  <!-- Left arm (holding rifle) -->
  <path d="M 28 52 L 20 56 L 20 68 L 28 68 Z" fill="#1E88E5" stroke="#0D47A1" stroke-width="0.8"/>
  <circle cx="22" cy="64" r="4" fill="#FFCC80" stroke="#E8A850" stroke-width="0.5"/>

  <!-- Right arm -->
  <path d="M 68 52 L 76 56 L 76 72 L 68 72 Z" fill="#1E88E5" stroke="#0D47A1" stroke-width="0.8"/>
  <circle cx="74" cy="70" r="4" fill="#FFCC80" stroke="#E8A850" stroke-width="0.5"/>

  <!-- Neck -->
  <rect x="40" y="44" width="16" height="8" fill="#FFCC80"/>

  <!-- Head -->
  <ellipse cx="48" cy="32" rx="18" ry="16" fill="#FFCC80" stroke="#E8A850" stroke-width="0.8"/>

  <!-- Beret -->
  <path d="M 28 32 Q 32 14, 48 12 Q 64 14, 68 32 Q 60 26, 48 24 Q 36 26, 28 32 Z"
        fill="#1565C0" stroke="#0D47A1" stroke-width="1"/>
  <ellipse cx="48" cy="32" rx="20" ry="4" fill="#1E88E5"/>

  <!-- Visor -->
  <rect x="32" y="28" width="20" height="6" rx="2" fill="#F44336" opacity="0.9"/>
  <rect x="34" y="29" width="8" height="4" rx="1" fill="#FFFFFF" opacity="0.5"/>
</svg>
